# Option B — API only (Amplify hosts the app)
# Domain: api.jcsmartbag.com → Elastic IP 13.63.123.201 (GoDaddy A record)
#
# Install:
#   sudo cp deploy/ec2-api-nginx.conf /etc/nginx/sites-available/api-jcsmartbag
#   sudo ln -sf /etc/nginx/sites-available/api-jcsmartbag /etc/nginx/sites-enabled/
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
# HTTPS:
#   sudo certbot --nginx -d api.jcsmartbag.com
#
# Backend Docker must bind 127.0.0.1:5000 only (docker-compose.prod.yml).

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;
    return 444;
}

server {
    server_name api.jcsmartbag.com;

    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    listen [::]:443 ssl ipv6only=on; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/api.jcsmartbag.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/api.jcsmartbag.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}


server {
    if ($host = api.jcsmartbag.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    listen [::]:80;
    server_name api.jcsmartbag.com;
    return 404; # managed by Certbot
}