# Bag Tracker — all-in-one on EC2 (HTTP) — optional; Option B uses deploy/ec2-api-nginx.conf
# Domain reference: jcsmartbag.com (app / api subdomains)
# Install: sudo cp deploy/ec2-nginx.conf /etc/nginx/sites-available/bag-tracker
#          sudo ln -sf /etc/nginx/sites-available/bag-tracker /etc/nginx/sites-enabled/
#          sudo rm -f /etc/nginx/sites-enabled/default
#          sudo nginx -t && sudo systemctl reload nginx
#
# Put the Vite build in: /var/www/bag-tracker  (contents of frontend/dist/)
# Backend Docker must listen on 127.0.0.1:5000 only (see docker-compose.prod.yml).

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name app.jcsmartbag.com _;

    root /var/www/bag-tracker;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/xml image/svg+xml;

    # API (Express)
    location /api {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Uploaded bag images (Express static)
    location /uploads {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # React Router (SPA)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
