# Option B — API only (Amplify hosts the app)
# Domain: api.jcsmartbag.com → Elastic IP 13.63.123.201 (GoDaddy A record)
#
# Install:
#   sudo cp deploy/ec2-api-nginx.conf /etc/nginx/sites-available/api-jcsmartbag
#   sudo ln -sf /etc/nginx/sites-available/api-jcsmartbag /etc/nginx/sites-enabled/
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
# HTTPS:
#   sudo certbot --nginx -d api.jcsmartbag.com
#
# Backend Docker must bind 127.0.0.1:5000 only (docker-compose.prod.yml).

server {
    listen 80;
    listen [::]:80;
    server_name api.jcsmartbag.com;

    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
