services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: bagtracker
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    environment:
      PORT: "5000"
      DATABASE_URL: "postgresql://postgres:root@db:5432/bagtracker?schema=public"
      JWT_SECRET: "supers3cr3tjwtk3y"
      APP_URL: "http://localhost:5173"
    ports:
      - "5000:5000"
    depends_on:
      - db

volumes:
  postgres_data: