# Production (Option B: frontend on Amplify, API on EC2)
# Public site: both https://jcsmartbag.com and https://www.jcsmartbag.com (Amplify + GoDaddy DNS)
# Pick ONE canonical URL in Amplify (redirect the other). APP_URL must match that primary hostname.
# EC2 Elastic IP: 13.63.123.201 — GoDaddy: A record api.jcsmartbag.com → this IP

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Henok_USA@2025
      POSTGRES_DB: bagtracker
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    environment:
      PORT: "5000"
      DATABASE_URL: "postgresql://postgres:Henok_USA@2025@db:5432/bagtracker?schema=public"
      JWT_SECRET: "CHANGE_ME_JWT_SECRET"
      # Canonical site URL (match Amplify “primary domain” after redirects)
      APP_URL: "https://www.jcsmartbag.com"

      SMTP_HOST: "smtp.gmail.com"
      SMTP_PORT: "587"
      SMTP_USER: "YOUR_EMAIL"
      SMTP_PASS: "YOUR_APP_PASSWORD"
      MAIL_FROM: "no-reply@jcsmartbag.com"

      STRIPE_SECRET_KEY: "sk_live_xxx"
      STRIPE_WEBHOOK_SECRET: "whsewhsec_xxxc"
      STRIPE_PRICE_MONTHLY_200: "price_1TGOML1rWpYYCBpABYJzBkfi"
      STRIPE_PRICE_QUARTERLY_400: "price_1TGONf1rWpYYCBpAk5U3v6Vu"
      STRIPE_PRICE_YEARLY_600: "price_1TGOMm1rWpYYCBpAf4R5uHo8"
    depends_on:
      - db
    # Localhost only — Nginx on EC2 proxies https://api.jcsmartbag.com → this port
    ports:
      - "127.0.0.1:5000:5000"
    restart: unless-stopped

volumes:
  postgres_data:
